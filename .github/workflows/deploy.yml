name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      # npm ci requires exact platform-optional-dependency parity with the lock
      # file; that lock file was generated on Windows, so Linux-only optional
      # deps (e.g. Rolldown's WASM fallback) are absent and npm ci fails.
      - run: npm install
      - run: npm run build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.attempt1.outputs.page_url || steps.attempt2.outputs.page_url || steps.attempt3.outputs.page_url }}
    steps:
      # GitHub's Pages backend occasionally rejects a freshly-created
      # deployment with a generic "Deployment failed, try again later" a
      # few seconds after accepting it. Confirmed via run history this
      # isn't caused by anything in this workflow (e.g. the concurrent
      # CodeQL scan) — it's transient on GitHub's end, so just retry.
      - name: Deploy to GitHub Pages (attempt 1)
        id: attempt1
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retry 1
        if: steps.attempt1.outcome == 'failure'
        run: sleep 20

      - name: Deploy to GitHub Pages (attempt 2)
        id: attempt2
        if: steps.attempt1.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retry 2
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        run: sleep 40

      - name: Deploy to GitHub Pages (attempt 3)
        id: attempt3
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        uses: actions/deploy-pages@v5
