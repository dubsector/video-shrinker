name: Translate strings

on:
  push:
    branches: [main]
    paths:
      - 'src/locales/en.json'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: translate
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24

      # Gemini free tier allows 10 requests/minute, so space requests 7s
      # apart. The committed cache file keeps reruns incremental: only new
      # or changed source strings reach the API.
      - name: Translate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          npx --yes i18n-ai-translate@latest translate \
            -i src/locales/en.json \
            -o af am ar az be bg bn ca cs da de el es et eu fa fi fr gl gu he hi hr hu hy id is it ja ka kk km kn ko ky lo lt lv mk ml mn mr ms my ne nl no pa pl pt rm ro ru si sk sl sq sr sv sw ta te th tl tr uk ur vi zh zu \
            -e gemini \
            -m gemini-3.1-flash-lite \
            -r 7000 \
            --cache .github/i18n/cache.json \
            --glossary .github/i18n/glossary.json \
            --context "Video Shrinker, a web app that compresses a video file to a target size locally on the user's device" \
            --verbose \
            -k "$GEMINI_API_KEY"

      # The translator only accepts ISO 639-1 codes, so Traditional
      # Chinese can't be requested from the API. Derive zh-TW from the
      # Simplified output instead: OpenCC's cn->twp conversion handles
      # both the script change and Taiwan vocabulary, costs no API
      # requests, and stays in sync with zh.json on every run.
      - name: Derive Traditional Chinese
        run: |
          npm install --no-save --no-package-lock opencc-js@1
          node <<'EOF'
          const fs = require('fs');
          const OpenCC = require('opencc-js');
          const convert = OpenCC.Converter({ from: 'cn', to: 'twp' });
          const walk = (node) =>
            typeof node === 'string'
              ? convert(node)
              : Object.fromEntries(Object.entries(node).map(([k, v]) => [k, walk(v)]));
          const zh = JSON.parse(fs.readFileSync('src/locales/zh.json', 'utf8'));
          fs.writeFileSync('src/locales/zh-TW.json', JSON.stringify(walk(zh), null, 4) + '\n');
          EOF

      - name: Open and merge PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain src/locales .github/i18n)" ]; then
            echo "Translations already up to date."
            exit 0
          fi
          BRANCH="i18n-translations-${{ github.run_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src/locales .github/i18n/cache.json
          git commit -m "Update translations"
          git push origin "$BRANCH"
          gh pr create \
            --title "Update translations" \
            --body "Automated translation refresh for src/locales." \
            --base main \
            --head "$BRANCH"
          # PRs opened with the workflow token never start pull_request
          # workflows, so dispatch the required check onto the branch
          # explicitly, wait for it, then merge.
          gh workflow run pr-checks.yml --ref "$BRANCH"
          sleep 15
          RUN_ID=$(gh run list --workflow=pr-checks.yml --branch "$BRANCH" --limit 1 --json databaseId --jq '.[0].databaseId')
          gh run watch "$RUN_ID" --exit-status
          gh pr merge "$BRANCH" --squash --delete-branch
          # Merges by the workflow token don't trigger push workflows
          # either, so kick the Pages deploy directly.
          gh workflow run deploy.yml --ref main
